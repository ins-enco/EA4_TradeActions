name: Build MT4 EA

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile TradeAction.mq4
    # MetaEditor must be installed on the target Windows runner.
    runs-on:
      - self-hosted
      - Windows
      - X64
      - mt4

    defaults:
      run:
        shell: powershell

    env:
      SOURCE_FILE: TradeAction.mq4
      OUTPUT_FILE: TradeAction.ex4
      LOG_FILE: metaeditor-mt4-compile.log

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve MetaEditor path
        id: metaeditor
        run: |
          $metaEditorPath = "${{ vars.METAEDITOR_PATH }}"

          if ([string]::IsNullOrWhiteSpace($metaEditorPath))
          {
             $metaEditorPath = $env:METAEDITOR_PATH
          }

          if ([string]::IsNullOrWhiteSpace($metaEditorPath))
          {
             throw "METAEDITOR_PATH is not set. Configure it as a repository variable or as an environment variable on the runner."
          }

          if (-not (Test-Path -LiteralPath $metaEditorPath))
          {
             throw "MetaEditor was not found at '$metaEditorPath'."
          }

          "path=$metaEditorPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Compile expert advisor
        run: |
          $sourceFile     = Join-Path $env:GITHUB_WORKSPACE $env:SOURCE_FILE
          $outputFile     = Join-Path $env:GITHUB_WORKSPACE $env:OUTPUT_FILE
          $logFile        = Join-Path $env:GITHUB_WORKSPACE $env:LOG_FILE
          $metaEditorPath = "${{ steps.metaeditor.outputs.path }}"

          if (-not (Test-Path -LiteralPath $sourceFile))
          {
             throw "Source file not found: $sourceFile"
          }

          # Remove stale outputs so the job only passes on a fresh compile.
          if (Test-Path -LiteralPath $outputFile)
          {
             Remove-Item -LiteralPath $outputFile -Force
          }

          if (Test-Path -LiteralPath $logFile)
          {
             Remove-Item -LiteralPath $logFile -Force
          }

          $arguments = @(
             "/compile:$sourceFile"
             "/log:$logFile"
          )

          $process = Start-Process -FilePath $metaEditorPath -ArgumentList $arguments -NoNewWindow -Wait -PassThru

          if (-not (Test-Path -LiteralPath $logFile))
          {
             throw "Compile log was not created: $logFile"
          }

          Get-Content -Path $logFile

          if ($process.ExitCode -ne 0)
          {
             throw "MetaEditor exited with code $($process.ExitCode)."
          }

          $logContent = Get-Content -Path $logFile -Raw
          if ($logContent -match 'Result:\s*(\d+)\s+errors?,\s*(\d+)\s+warnings?')
          {
             $errors   = [int]$matches[1]
             $warnings = [int]$matches[2]

             if ($errors -gt 0)
             {
                throw "Compilation failed with $errors error(s) and $warnings warning(s)."
             }

             if ($warnings -gt 0)
             {
                Write-Warning "Compilation finished with $warnings warning(s)."
             }
          }
          else
          {
             Write-Warning "Could not parse the compile summary from the MetaEditor log."
          }

          if (-not (Test-Path -LiteralPath $outputFile))
          {
             throw "Compiled artifact was not created: $outputFile"
          }

      - name: Upload build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: mt4-build
          path: |
            TradeAction.ex4
            metaeditor-mt4-compile.log
          if-no-files-found: warn
